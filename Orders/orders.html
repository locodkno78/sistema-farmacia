<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="module" src="./orders.js"></script>
    <script src="https://use.fontawesome.com/releases/v5.0.7/js/all.js"></script>
    <link rel="stylesheet" href="style.css">

    <title>Orders</title>
</head>

<body>
    <header>
        <div id="navbar-placeholder"></div>
    </header>
    <div class="container">
        <div id="notification" class="notification"></div>
        <main>
            <div class="header d-flex container-fluid">
                <h1>Pedidos a Proveedores</h1>
                <div class="control">
                    <form class="d-flex" role="search">
                        <input class="form-control me-2 searchInput" id="searchInput" type="search"
                            placeholder="Producto" aria-label="Search">
                        <button type="button" class="btn btn-success searchButton" id="searchButton">Buscar</button>
                    </form>
                </div>
            </div>
            <div class="table-responsive" id="tableButtons">
                <table class="table table-hover table-bordered" id="table">
                    <!--LOS DATOS SE CARGARÁN DE FORMA DINAMICA-->
                </table>
                <div id="btn" class="d-grid gap-2 col-4 mx-auto">
                    <button type="button" id="print" class="btn btn-info btn-lg">Imprimir Pedido</button>
                    <button type="button" id="delete" class="btn btn-danger btn-lg">Eliminar Pedido</button>
                </div>
            </div>
    </div>
    </main>
    <!-- Formulario de edición de Producto-->
    <div id="editProducto" class="modal fade" tabindex="-1" aria-labelledby="editProductolabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <header class="modal-header">
                    <h3 class="modal-title">Editar Producto</h3>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"
                        id="closeModal"></button>
                </header>
                <div class="modal-body">
                    <form id="edit-form">
                        <div class="field">
                            <label for="edit-name" class="label"><strong> Producto </strong></label>
                            <div class="control">
                                <input type="text" class="input" name="name" required>
                            </div>
                        </div>
                        <div class="field">
                            <label for="edit-cantidad" class="label"><strong> Cantidad </strong></label>
                            <div class="control">
                                <input type="number" class="input" name="cantidad" required>
                            </div>
                        </div>

                        <div class="modal-footer">
                            <button type="button" id="closeEditModal" class="btn btn-warning" data-bs-dismiss="modal"
                                aria-label="close">Cerrar</button>
                            <button type="submit" class="btn btn-success" data-bs-dismiss="modal">
                                <i class="fas fa-save"></i>
                                <span>Guardar</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!--Vista de Producto-->
    <div id="viewProducto" class="modal fade" tabindex="-1" aria-labelledby="viewProductolabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title">Producto</h3>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"
                        id="closeViewModal"></button>
                </div>
                <div class="modal-body">
                    <div class="content">
                        <p><strong>Producto:</strong> <span id="name"></span></p>
                        <p><strong>Cantidad:</strong> <span id="cantidad"></span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../navbar.js"></script>
</body>

</html>
