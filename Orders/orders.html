<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="./orders.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://use.fontawesome.com/releases/v5.0.7/js/all.js"></script>
    <link rel="stylesheet" href="style.css">

    <title>Orders</title>
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="d-flex container-fluid">
                <h3 class="navbar-title">
                    <span id="user-name"></span>
                </h3>
                <div>
                    <button class="btn button-back btn-warning" type="button" id="button-back"> Volver </button>
                </div>
            </div>
        </nav>       
    </header>
    <main>
        <div class="conteiner">
            <div class="header d-flex container-fluid">
                <h1>Pedido</h1>
                <div class="control">
                    <form class="d-flex" role="search">
                        <input class="form-control me-2" id="searchInput" type="search" placeholder="Producto"
                            aria-label="Search">
                        <button type="button" class="btn btn-success" id="searchButton">Buscar</button>
                    </form>
                </div>                
            </div>
            <div class="table-responsive">
                <table class="table table-hover table-bordered" id="table">
                    <!--LOS DATOS SE CARGARÁN DE FORMA DINAMICA-->
                </table>
                <div id="btn" class="d-grid gap-2 col-4 mx-auto">
                    <button type="button" id="print" class="btn btn-info btn-lg">Imprimir Cuenta</button>
                    <button type="button" id="delete" class="btn btn-danger btn-lg">Cancelar Cuenta</button>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
   <!-- <script type="module" src="../firebase.js"></script>-->
</body>

</html>
