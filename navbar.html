<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Navbar</title>
  <!-- Bootstrap CSS (opcional si ya lo tienes en tu página principal) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <!-- Navbar Principal -->
  <nav class="navbar navbar-expand-lg bg-success navbar-dark fixed-top">
    <div class="container-fluid">
      <span class="navbar-brand" id="user-display">
        <span id="user-name"></span>        
      </span>
      
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarMenu">
        <div class="navbar-nav ms-auto">
      
          <a class="btn btn-outline-light mx-1 button-sales" href="../Sales/sales.html">Ventas</a>
          <a class="btn btn-outline-light mx-1 button-customers" href="../Customers/tableCustomers.html">Clientes</a>
          <a class="btn btn-outline-light mx-1 button-order" href="../Orders/orders.html">Pedidos</a>
          <a class="btn btn-outline-light mx-1 button-products" href="../Products/products.html">Productos</a>
          
          <button class="btn btn-light mx-1" data-bs-toggle="modal" data-bs-target="#signupModal">
            <i class="fas fa-user-plus me-1"></i> Nuevo Usuario
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Modal de Registro (en el mismo archivo) -->
  <div class="modal fade" id="signupModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header bg-success text-white">
          <h5 class="modal-title">
            <i class="fas fa-user-plus me-2"></i>Registrar Nuevo Usuario
          </h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="signup-form">
            <div class="mb-3">
              <label class="form-label">Nombre Completo</label>
              <input type="text" class="form-control" id="signup-username" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="signup-email" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <input type="password" class="form-control" id="signup-password" required>
            </div>
            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-success">
                <i class="fas fa-save me-2"></i>Registrar Usuario
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Font Awesome (opcional si ya lo tienes) -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>
</html>
