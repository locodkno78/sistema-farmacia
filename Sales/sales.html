<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="module" src="sales.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://use.fontawesome.com/releases/v5.0.7/js/all.js"></script>
    <script type="module" src="../firebase.js"></script>
    <title>Sales</title>
</head>

<body>
    <header>
        <div id="navbar-placeholder"></div>
    </header>
    <main>
        <div class="container">
            <div id="notification" class="notification"></div>
            <div class="header">
                <div class="title">
                    <h1>Ventas</h1>
                </div>
                <div class="control">
                    <form role="search" class="d-flex align-items-center">
                        <input class="form-control me-2" id="searchInput" type="search" placeholder="Producto"
                            aria-label="Search">
                        <button type="button" class="btn btn-success" id="searchButton">Buscar</button>
                    </form>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table table-hover table-bordered" id="table">
                    <thead>
                        <tr>
                            <th class="th">Nombre</th>
                            <th class="th">Precio</th>
                            <th class="th">Cantidad</th>
                            <th class="th">Descuento (%)</th>
                            <th class="th">Total</th>
                            <th class="th">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Aquí se agregarán las filas dinámicamente -->
                    </tbody>
                    <tfoot>
                        <tr>
                            <td class="empty" colspan="4" style="text-align: right;"></td>
                            <td >Total General:</td>
                            <td id="totalGeneral">$0.00</td>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <div class="modal fade" id="productModal" tabindex="-1" aria-labelledby="productModalLabel"
                aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" id="productModalLabel">Seleccionar Producto</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body" id="modalBody">
                            <!-- Aquí se cargarán los productos dinámicamente -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Botón Pagar -->
            <button type="button" class="btn btn-success" id="payButton">Pagar</button>

            <!-- Modal para seleccionar el método de pago -->
            <div class="modal fade" id="payModal" tabindex="-1" aria-labelledby="payModalLabel" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" id="payModalLabel">Selecciona el Método de Pago</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <p id="totalToPay"></p>
                            <div>
                                <p id="payCash"></p>
                                <p id="payCard"></p>
                            </div>
                            <button type="button" class="btn btn-success" id="finalizarPagoButton">Pagar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
<script type="module" src="../Navbar/navbar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>


</html>
